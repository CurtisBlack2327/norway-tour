<svg xmlns="http://www.w3.org/2000/svg" width="800" height="533" viewBox="0 0 800 533">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="50%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="533" fill="url(#bg)"/>
  <text x="400" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="64" fill="#94a3b8" filter="url(#glow)">🏖️</text>
  <text x="400" y="280" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="28" fill="#e8ecf4" font-weight="bold">Haukland白沙滩</text>
  <text x="400" y="320" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#a0b4d0">挪威之旅 · Northern Norway</text>
  <line x1="300" y1="345" x2="500" y2="345" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
</svg>